<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trắc nghiệm Hiến pháp</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    color:#38bdf8;
}

.top{
    position:sticky;
    top:0;
    background:#0f172a;
    padding:10px 0;
    z-index:100;
}

.score{
    font-size:22px;
    font-weight:bold;
    text-align:center;
    margin:10px 0;
}

.reload{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-bottom:15px;
}

.question{
    background:#1e293b;
    margin-bottom:20px;
    padding:20px;
    border-radius:15px;
}

.question h3{
    margin-top:0;
    line-height:1.5;
}

.answer{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    cursor:pointer;
    text-align:left;
    font-size:15px;
    transition:0.2s;
}

.answer:hover{
    background:#475569;
}

.correct{
    background:#16a34a !important;
}

.wrong{
    background:#dc2626 !important;
}

.result{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <h1>TRẮC NGHIỆM HIẾN PHÁP</h1>

    <div class="top">
        <button class="reload" onclick="reloadQuiz()">

        </button>

        <div class="score" id="score">
            Điểm: 0/33
        </div>
    </div>

    <div id="quiz"></div>

</div>

correct:1

];

function shuffle(array){
    return array.sort(() => Math.random() - 0.5);
}

let score = 0;
let answered = 0;

function loadQuiz(){

    const quiz = document.getElementById("quiz");
    quiz.innerHTML = "";

    score = 0;
    answered = 0;

    document.getElementById("score").innerText = "Điểm: 0/33";

    let shuffled = shuffle([...questions]);

    shuffled.forEach((item,index)=>{

        const div = document.createElement("div");
        div.className = "question";

        div.innerHTML = `
        <h3>Câu ${index+1}: ${item.q}</h3>
        `;

        item.a.forEach((answer,i)=>{

            const btn = document.createElement("button");
            btn.className = "answer";
            btn.innerText = String.fromCharCode(65+i)+". "+answer;

            btn.onclick = function(){

                if(div.dataset.done) return;

                div.dataset.done = true;

                answered++;

                const buttons = div.querySelectorAll(".answer");

                if(i === item.correct){

                    btn.classList.add("correct");

                    div.innerHTML += `
                    <div class="result" style="color:#4ade80">
                    Đúng
                    </div>
                    `;

                    score++;

                }else{

                    btn.classList.add("wrong");

                    buttons[item.correct].classList.add("correct");

                    div.innerHTML += `
                    <div class="result" style="color:#f87171">
                    Sai — Đáp án đúng:
                    ${String.fromCharCode(65+item.correct)}.
                    ${item.a[item.correct]}
                    </div>
                    `;
                }

                document.getElementById("score").innerText =
                "Điểm: "+score+"/33";

                if(answered === 33){

                    setTimeout(()=>{
                        alert("Hoàn thành! Bạn đúng "+score+"/33 câu");
                    },300);

                }

            };

            div.appendChild(btn);

        });

        quiz.appendChild(div);

    });

}

function reloadQuiz(){
    loadQuiz();
    window.scrollTo(0,0);
}

loadQuiz();

</script>
